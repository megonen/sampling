  <script>
const React = window.React;
const { useState, useMemo, useCallback } = React;
const {
  LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip,
  Legend, ReferenceLine, ResponsiveContainer, ComposedChart
} = window.Recharts;

const C = {
  bg: "#0d1117", panel: "#161b22", panel2: "#1c2128",
  border: "#30363d", blue: "#58a6ff", red: "#f85149",
  green: "#3fb950", yellow: "#d29922", purple: "#bc8cff",
  orange: "#e07b39", teal: "#39d0c8", text: "#e6edf3", muted: "#8b949e"
};

// ─── Math helpers ──────────────────────────────────────────────
function comb(n, k) {
  if (k < 0 || k > n || n < 0) return 0;
  if (k === 0 || k === n) return 1;
  let r = 1;
  const m = Math.min(k, n - k);
  for (let i = 0; i < m; i++) r = r * (n - i) / (i + 1);
  return r;
}
function binomPDF(R, a, pd) {
  return comb(R, a) * Math.pow(Math.max(0, pd), a) * Math.pow(Math.max(0, 1 - pd), R - a);
}
// P(all t drawn nodes are adversarial | a adversarial out of R, draw t without replacement)
function pfailSingle(a, R, t) {
  if (a < t) return 0;
  return comb(a, t) / comb(R, t);
}
// pfailEff: under binomial approximation = p_d^t (R-independent)
// Proof: sum_{a=t}^{R} C(R,a) p_d^a (1-p_d)^{R-a} * C(a,t)/C(R,t) = p_d^t
function pfailEff(pd, R, t) {
  return Math.pow(Math.max(0, pd), t);
}
// Attack A: P(validator fails sampling) — needs S-tau+1 failures
function PA(pd, R, t, S, tau) {
  const pf = pfailEff(pd, R, t);
  let s = 0;
  const from = S - tau + 1;
  for (let j = from; j <= S; j++) s += comb(S, j) * Math.pow(pf, j) * Math.pow(1 - pf, S - j);
  return Math.min(1, Math.max(0, s));
}
// Attack B: P(validator accepts unavailable data)
// Correct model: adversary (as encoder) optimally distributes data to at most K
// subnetworks (so data stays unrecoverable). It picks subnetworks with highest
// p_resp = P(validator hits at least one adversarial node in t queries).
// t affects Attack B: higher t → higher p_resp for partial capture subnetworks.
function pSamp(a, R, t) {
  // p_samp: P(at least one of t drawn nodes is adversarial | a adversarial out of R)
  // This is purely a function of the sampling mechanism, independent of dispersal.
  if (R - a < t) return 1.0;
  return 1.0 - comb(R - a, t) / comb(R, t);
}
function pSubnet(a, R, t, pDis) {
  // General subnetwork attack probability = p_samp * p_dis
  // Attack A: pDis=0 (adversary withholds) → uses pfailSingle instead
  // Attack B: pDis=1 (adversary holds and responds)
  return pSamp(a, R, t) * pDis;
}
function pEff(pd, R, t, N, K, pDis) {
  // p_eff: effective probability a randomly sampled subnetwork produces adversarial outcome
  // = (1/N) * sum over chosen K subnets of p_samp(a,R,t) * pDis
  // Adversary greedily picks K subnets with highest p_samp (subject to recoverability constraint)
  const levels = [];
  for (let a = 1; a <= R; a++) {
    const ps = pSamp(a, R, t) * pDis;
    const na = N * comb(R, a) * Math.pow(Math.max(0,pd), a) * Math.pow(Math.max(0,1-pd), R-a);
    if (ps > 0 && na > 0) levels.push({ ps, na });
  }
  levels.sort((a, b) => b.ps - a.ps);
  let remaining = K, totalContrib = 0;
  for (const { ps, na } of levels) {
    const take = Math.min(na, remaining);
    totalContrib += take * ps;
    remaining -= take;
    if (remaining <= 0) break;
  }
  return totalContrib / N;
}
function PB_full(pd, R, t, N, K, S, tau) {
  // Attack B: pDis=1 (adversary holds data and responds with valid proofs)
  const pe = pEff(pd, R, t, N, K, 1.0);
  let s = 0;
  for (let g = tau; g <= S; g++) s += comb(S, g) * Math.pow(pe, g) * Math.pow(1 - pe, S - g);
  return Math.min(1, Math.max(0, s));
}
// Regime thresholds
// Attack A mean-field crossover: p_d where E[failures] = S-tau, i.e. p_d^t = (S-tau)/S
function th_A(tau, S, t) { return Math.pow(Math.max(0, (S - tau) / S), 1 / t); }
function th_B(e, R) { return Math.pow(Math.max(0, 1 - 1 / e), 1 / R); }
// Attack B feasibility threshold: p_d >= 1 - (1-1/e)^{1/R}
function th_feas(e, R) { return 1 - Math.pow(Math.max(0, 1 - 1 / e), 1 / R); }
// Attack B impossibility bound: tau > S/e => P_B = 0
function isAttackBImpossible(tau, S, e) { return tau > S / e; }

// ─── UI Components ─────────────────────────────────────────────
function Tip({ text }) {
  const [show, setShow] = useState(false);
  return React.createElement("span", {
    style: { position: "relative", display: "inline-block", marginLeft: 4 }
  },
    React.createElement("span", {
      onMouseEnter: () => setShow(true), onMouseLeave: () => setShow(false),
      style: { cursor: "help", color: C.muted, fontSize: 11, border: `1px solid ${C.muted}`, borderRadius: "50%", width: 14, height: 14, display: "inline-flex", alignItems: "center", justifyContent: "center", userSelect: "none" }
    }, "?"),
    show && React.createElement("div", {
      style: { position: "absolute", left: 20, top: -4, zIndex: 99, background: C.panel2, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 12px", width: 260, fontSize: 11, color: C.text, lineHeight: 1.6, whiteSpace: "pre-line" }
    }, text)

}

function ParamInput({ label, tip, value, onChange, step, min, max, readOnly, color }) {
  return React.createElement("div", { style: { display: "flex", flexDirection: "column", gap: 4 } },

}

function StatCard({ label, tip, value, color }) {
  return React.createElement("div", {
    style: { background: C.bg, border: `1px solid ${color || C.border}`, borderRadius: 7, padding: "8px 13px", minWidth: 140 }
  },
    React.createElement("div", { style: { fontSize: 10, color: C.muted, fontFamily: "monospace", marginBottom: 3, display: "flex", alignItems: "center" } },
      label, tip && React.createElement(Tip, { text: tip })
    ),
    React.createElement("div", { style: { fontSize: 13, color: color || C.text, fontFamily: "monospace", fontWeight: "bold" } }, value)

}

function SecHead({ children }) {
  return React.createElement("div", {
    style: { fontSize: 10, letterSpacing: "0.15em", color: C.muted, fontFamily: "monospace", marginBottom: 10, textTransform: "uppercase" }
  }, children);
}

function RegimeBar({ thA, thRecov, thFeas, paVal, pbVal, pd, bImpossible }) {
  const safe = Math.min(thA, 1) * 100;
  const mid = Math.max(0, (Math.min(thRecov, 1) - Math.min(thA, 1))) * 100;
  const danger = Math.max(0, 100 - safe - mid);
  const marker = pd * 100;
  const feasMarker = (thFeas || 0) * 100;
  const paLabel = paVal < 0.01 ? "<1%" : (paVal * 100).toFixed(0) + "%";
  const pbLabel = bImpossible ? "0 (impossible)" : pbVal < 0.01 ? "<1%" : (pbVal * 100).toFixed(0) + "%";
  return React.createElement("div", { style: { marginTop: 8 } },
    React.createElement("div", { style: { position: "relative", height: 22, borderRadius: 5, overflow: "hidden", display: "flex", fontSize: 10, fontWeight: "bold" } },
      React.createElement("div", { style: { width: safe + "%", background: "#27500A", display: "flex", alignItems: "center", justifyContent: "center", color: "#3fb950" } }, safe > 12 ? "SAFE" : ""),
      React.createElement("div", { style: { width: mid + "%", background: "#4a2800", display: "flex", alignItems: "center", justifyContent: "center", color: C.yellow } }, mid > 16 ? "A dominant" : mid > 8 ? "A" : ""),
      React.createElement("div", { style: { width: danger + "%", background: "#3d0000", display: "flex", alignItems: "center", justifyContent: "center", color: C.red } }, danger > 14 ? "recovery threat" : danger > 7 ? "rec." : ""),
      React.createElement("div", { style: { position: "absolute", top: 0, bottom: 0, left: marker + "%", width: 2, background: C.teal, transform: "translateX(-50%)" } }),
      thFeas > 0 && React.createElement("div", { style: { position: "absolute", top: 0, bottom: 0, left: feasMarker + "%", width: 2, background: C.orange, transform: "translateX(-50%)", opacity: 0.7 } })
    ),
    React.createElement("div", { style: { display: "flex", justifyContent: "space-between", fontSize: 10, fontFamily: "monospace", color: C.muted, marginTop: 3, flexWrap: "wrap", gap: 4 } },
      React.createElement("span", null, "0%"),
      thFeas > 0 && React.createElement("span", { style: { color: C.orange } }, "B feas: " + feasMarker.toFixed(1) + "%"),
      React.createElement("span", { style: { color: C.yellow } }, "A crossover: " + (thA * 100).toFixed(1) + "%"),
      React.createElement("span", { style: { color: C.red } }, "recovery: " + (thRecov * 100).toFixed(1) + "%"),
      React.createElement("span", null, "100%")
    ),
    React.createElement("div", { style: { marginTop: 6, fontSize: 11, fontFamily: "monospace", display: "flex", gap: 20, flexWrap: "wrap" } },
      React.createElement("span", null, React.createElement("span", { style: { color: C.yellow } }, "P_A = " + paLabel), React.createElement("span", { style: { color: C.muted } }, " (liveness)")),
      React.createElement("span", null, React.createElement("span", { style: { color: C.red } }, "P_B = " + pbLabel), React.createElement("span", { style: { color: C.muted } }, " (safety — continuous, no hard threshold)")),
      React.createElement("span", null, React.createElement("span", { style: { color: C.teal } }, "│"), React.createElement("span", { style: { color: C.muted } }, " p_d")),
      thFeas > 0 && React.createElement("span", null, React.createElement("span", { style: { color: C.orange } }, "│"), React.createElement("span", { style: { color: C.muted } }, " B feasibility"))
    )
  );
}

// ─── Tab content ──────────────────────────────────────────────
const TABS = [
  { id: "overview", label: "Attack A vs B" },
  { id: "tau",      label: "τ effect" },
  { id: "t",        label: "t effect" },
  { id: "R",        label: "R effect" },
];

const STEPS = 60;
const PDS = Array.from({ length: STEPS + 1 }, (_, i) => i / STEPS);

const LINE_COLORS = [C.blue, C.green, C.yellow, C.red, C.purple, C.orange];

function mkData(vals, fn) {
  return PDS.map((pd, i) => {
    const row = { pd: (pd * 100).toFixed(1) };
    vals.forEach((v, vi) => { row["v" + vi] = fn(pd, v); });
    return row;
  });
}

function AttackChart({ title, sub, data, keys, colors, labels }) {
  return React.createElement("div", { style: { flex: 1, minWidth: 0 } },
    React.createElement("div", { style: { fontSize: 11, color: C.muted, fontFamily: "monospace", marginBottom: 4 } }, title),
    React.createElement("div", { style: { fontSize: 10, color: C.muted, marginBottom: 8, opacity: 0.7 } }, sub),
    React.createElement("div", { style: { display: "flex", gap: 12, marginBottom: 8, flexWrap: "wrap" } },
      keys.map((k, i) => React.createElement("div", { key: k, style: { display: "flex", alignItems: "center", gap: 5, fontSize: 10, fontFamily: "monospace", color: colors[i] } },
        React.createElement("svg", { width: 20, height: 8 }, React.createElement("line", { x1: 0, y1: 4, x2: 20, y2: 4, stroke: colors[i], strokeWidth: 2 })),
        labels[i]
      ))
    ),
    React.createElement(ResponsiveContainer, { width: "100%", height: 260 },
      React.createElement(LineChart, { data, margin: { left: 10, right: 10, top: 4, bottom: 18 } },
        React.createElement(CartesianGrid, { strokeDasharray: "3 3", stroke: C.border }),
        React.createElement(XAxis, { dataKey: "pd", tick: { fontSize: 10, fill: C.muted, fontFamily: "monospace" }, label: { value: "p_d (%)", position: "insideBottom", offset: -10, fontSize: 10, fill: C.muted }, tickCount: 7 }),
        React.createElement(YAxis, { domain: [0, 1], tick: { fontSize: 10, fill: C.muted, fontFamily: "monospace" }, tickCount: 6 }),
        React.createElement(Tooltip, {
          contentStyle: { background: C.panel, border: `1px solid ${C.border}`, borderRadius: 6, fontSize: 11, fontFamily: "monospace" },
          labelStyle: { color: C.muted }, itemStyle: { color: C.text },
          formatter: (v, name) => [v.toFixed(5), name]
        }),
        keys.map((k, i) => React.createElement(Line, { key: k, type: "monotone", dataKey: k, stroke: colors[i], strokeWidth: 2, dot: false, name: labels[i], isAnimationActive: false }))
      )
    )
  );
}

// ─── Main App ─────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("overview");
  const [R,   setR]   = useState(5);
  const [S,   setS]   = useState(20);
  const [tau, setTau] = useState(13);
  const [t,   setT]   = useState(5);
  const [e,   setE]   = useState(2);
  const [N,   setN]   = useState(2048);
  const [pd,  setPd]  = useState(33);

  const pdFrac = pd / 100;
  const tauClamped = Math.min(tau, S);
  const tClamped   = Math.min(t, R);

  const thA = th_A(tauClamped, S, tClamped);
  const thB = th_B(e, R);

  const paVal = PA(pdFrac, R, tClamped, S, tauClamped);
  const pbVal = PB_full(pdFrac, R, tClamped, N, Math.floor(N/e), S, tauClamped);
  const pfVal = pfailEff(pdFrac, R, tClamped);
  const pfullVal = Math.pow(pdFrac, R);
  const failsNeeded = S - tauClamped + 1;
  const hitsNeeded  = tauClamped;
  const regime = pdFrac < thA ? "Below Attack A crossover — P_A negligible; P_B may still be non-negligible at high t"
               : pdFrac < thB ? "Attack A active — liveness threat; P_B growing"
               : "Attack A + B (safety threat)";
  const regimeColor = pdFrac < thA ? C.green : pdFrac < thB ? C.yellow : C.red;

  // ── Tab: overview ──
  const overviewData = useMemo(() => PDS.map(p => ({
    pd: (p * 100).toFixed(1),
    a: PA(p, R, tClamped, S, tauClamped),
    b: PB_full(p, R, tClamped, N, Math.floor(N/e), S, tauClamped)
  })), [R, tClamped, S, tauClamped, N]);

  // ── Tab: τ ──
  // τ values: parametric — spread across [1, S] proportionally
  const tauVals = useMemo(() => {
    const raw = [1, Math.round(S*0.25), Math.round(S*0.5), Math.round(S*0.65), Math.round(S*0.8), Math.round(S*0.9), S];
    return [...new Set(raw)].filter(v => v >= 1 && v <= S).sort((a,b) => a-b);
  }, [S]);
  const tauDataA = useMemo(() => mkData(tauVals, (p, v) => PA(p, R, tClamped, S, v)), [R, tClamped, S, tauVals]);
  const tauDataB = useMemo(() => mkData(tauVals, (p, v) => PB_full(p, R, tClamped, N, Math.floor(N/e), S, v)), [R, N, S, tauVals]);

  // ── Tab: t ──
  // t values: parametric — spread across [1, R]
  const tVals = useMemo(() => {
    if (R <= 4) return Array.from({length: R}, (_, i) => i + 1);
    const raw = [1, Math.round(R*0.25), Math.round(R*0.5), Math.round(R*0.75), R-1, R];
    return [...new Set(raw)].filter(v => v >= 1 && v <= R).sort((a,b) => a-b);
  }, [R]);
  const tDataA = useMemo(() => mkData(tVals, (p, v) => PA(p, R, v, S, tauClamped)), [R, S, tauClamped]);
  const tDataB = useMemo(() => mkData(tVals, (p, v) => PB_full(p, R, v, N, Math.floor(N/e), S, tauClamped)), [R, N, S, tauClamped]);

  // ── Tab: R ──
  const rVals  = [1, 3, 5, 7, 10];
  const rDataA = useMemo(() => mkData(rVals, (p, v) => PA(p, v, Math.min(tClamped, v), S, Math.min(tauClamped, S))), [tClamped, S, tauClamped]);
  const rDataB = useMemo(() => mkData(rVals, (p, v) => PB_full(p, v, Math.min(tClamped,v), N, Math.floor(N/2), S, tauClamped)), [N, S, tauClamped]);

  // ─ render ─
  return React.createElement("div", { style: { background: C.bg, minHeight: "100vh", color: C.text, padding: "20px 18px" } },

    // Header
    React.createElement("div", { style: { marginBottom: 20 } },
      React.createElement("div", { style: { fontSize: 10, letterSpacing: "0.18em", color: C.muted, fontFamily: "monospace", marginBottom: 5 } },
        "LOGOS BLOCKCHAIN DA LAYER — ADVERSARY ATTACK SURFACE CALCULATOR"
      ),
      React.createElement("h1", { style: { margin: 0, fontSize: 21, fontWeight: 700, color: C.text, letterSpacing: "-0.02em" } },
        "Selective Availability Attack"
      ),
      React.createElement("div", { style: { marginTop: 4, fontSize: 11, color: C.muted } },
        "Attack A (available→unavailable) exploits Type II error · ",
        "Attack B (unavailable→available) exploits Type I error · ",
        "Silence-only adversary model (no-false-proof assumption)"
      )
    ),

    // Params panel
    React.createElement("div", { style: { background: C.panel, border: `1px solid ${C.border}`, borderRadius: 10, padding: "16px 20px", marginBottom: 16 } },
      React.createElement(SecHead, null, "Protocol & Adversary Parameters"),
      React.createElement("div", { style: { display: "flex", flexWrap: "wrap", gap: 14, alignItems: "flex-end" } },
        React.createElement(ParamInput, { label: "N  (subnetworks)", tip: "Total subnetworks = total columns in expanded data. N = e·K.", value: N, onChange: setN, step: 256, min: 256, max: 8192 }),
        React.createElement(ParamInput, { label: "e  (expansion)", tip: "RS expansion factor. Recovery threshold K = N/e. Higher e raises Attack B global threshold.", value: e, onChange: setE, step: 1, min: 2, max: 6 }),
        React.createElement(ParamInput, { label: "R  (nodes/subnet)", tip: "Nodes per subnetwork. Primary structural defence for Attack B (capture probabilities scale as p_d^R). For Attack A under the binomial approximation, P_fail^eff = p_d^t is R-independent — t is the primary Attack A defence parameter.", value: R, onChange: v => { setR(v); if (t > v) setT(v); }, step: 1, min: 1, max: 20 }),
        React.createElement(ParamInput, { label: "S  (samples)", tip: "Columns sampled per validation round. Attack A needs S−τ+1 failures. Attack B needs τ hits.", value: S, onChange: v => { setS(v); if (tau > v) setTau(v); }, step: 1, min: 5, max: 100 }),
        React.createElement(ParamInput, { label: "τ  (threshold)", tip: `Accept if ≥ τ successes out of S.\nAttack A needs S−τ+1 = ${failsNeeded} failures.\nAttack B needs τ = ${hitsNeeded} hits.\nHigher τ → A easier, B harder.`, value: tauClamped, onChange: setTau, step: 1, min: 1, max: S, color: C.teal }),
        React.createElement(ParamInput, { label: "t  (retries/subnet)", tip: `Nodes queried per subnetwork. Governs p_samp — the probability the validator hits at least one adversarial node.\nAttack A (p_dis=0): higher t → harder (all t must land on silent adversarial nodes).\nAttack B (p_dis=1): higher t → easier (more chance of hitting adversarial node that holds data).\nt is a tradeoff parameter between the two attacks.`, value: tClamped, onChange: setT, step: 1, min: 1, max: R, color: C.purple }),
        React.createElement(ParamInput, { label: "p_d  (%)", tip: "Adversarial node fraction (0–100%). Teal line on regime bar shows current p_d.", value: pd, onChange: setPd, step: 1, min: 0, max: 100, color: C.orange }),
      ),

      // Stat cards
      React.createElement("div", { style: { display: "flex", flexWrap: "wrap", gap: 10, marginTop: 14 } },
        React.createElement(StatCard, { label: "Attack A  P_A", tip: `P(validator fails on available data)\nAdversary needs ${failsNeeded} failure(s) out of S=${S}`, value: paVal < 1e-6 ? "≈ 0" : paVal > 0.9999 ? "≈ 1" : paVal.toExponential(3), color: C.yellow }),
        React.createElement(StatCard, { label: "Attack B  P_B", tip: `P(validator accepts unavailable data)\nAdversary needs ${hitsNeeded} hit(s). Includes partial capture — any subnet with at least 1 adversarial node holding data can produce a false positive. Higher t makes this easier.`, value: pbVal < 1e-6 ? "≈ 0" : pbVal > 0.9999 ? "≈ 1" : pbVal.toExponential(3), color: C.red }),
        React.createElement(StatCard, { label: "P_fail^eff = q_A", tip: `Per-subnetwork false-failure probability (Layer 2).\nq_A = p_d^t = ${(Math.pow(pdFrac, tClamped)).toExponential(3)}.\nR-independent under binomial approximation.\nFeeds into P_A via (S, τ) decision rule (Layer 3).`, value: pfVal.toExponential(3), color: C.blue }),
        React.createElement(StatCard, { label: "P_full = p_d^R", tip: "Full capture probability per subnetwork = p_d^R. Governs global recovery threshold.", value: pfullVal.toExponential(3), color: C.purple }),
        React.createElement(StatCard, { label: "Failures needed (A)", tip: `S − τ + 1 = ${S} − ${tauClamped} + 1 = ${failsNeeded}.\nFailure budget = S − τ = ${S - tauClamped}.\nHigher τ → fewer failures needed → easier for Attack A.`, value: failsNeeded, color: C.yellow }),
        React.createElement(StatCard, { label: "Hits needed (B)", tip: `τ = ${tauClamped}.\nHigher τ → more hits needed → harder for Attack B.`, value: hitsNeeded, color: C.red }),
        React.createElement(StatCard, { label: "B feasibility p_d", tip: `Attack B feasibility threshold: p_d^feas = 1 − (1−1/e)^{1/R} = ${(th_feas(e, R)*100).toFixed(1)}%.\nThe adversary needs at least one node in K subnetworks for selective dispersal.\nMuch lower than the global recovery threshold (${(thB*100).toFixed(1)}%).`, value: (th_feas(e, R)*100).toFixed(1) + "%", color: C.orange }),
        React.createElement(StatCard, { label: "B impossible?", tip: `Attack B impossibility bound: τ/S > 1/e ⟹ P_B = 0.\nCurrent: τ/S = ${tauClamped}/${S} = ${(tauClamped/S).toFixed(3)}, 1/e = ${(1/e).toFixed(3)}.\n${isAttackBImpossible(tauClamped, S, e) ? "YES — Attack B is structurally impossible at this τ." : "NO — τ/S ≤ 1/e, Attack B is feasible."}`, value: isAttackBImpossible(tauClamped, S, e) ? "YES ✓" : "NO", color: isAttackBImpossible(tauClamped, S, e) ? C.green : C.muted }),
        React.createElement(StatCard, { label: "Crossover p_d (A)", tip: `Attack A crossover: p_d^cross = (1−τ/S)^{1/t}.\nAt this p_d, expected failures = failure budget.\nEncodes joint effect of (τ, S, t).`, value: (thA*100).toFixed(1) + "%", color: C.yellow }),
        React.createElement(StatCard, { label: "Regime", tip: `Attack A crossover (1−τ/S)^{1/t} = ${(thA*100).toFixed(1)}%.\nGlobal recovery threshold (1−1/e)^{1/R} = ${(thB*100).toFixed(1)}%.\nAttack B feasibility (1−(1−1/e)^{1/R}) = ${(th_feas(e,R)*100).toFixed(1)}%.\nBoth P_A and P_B grow continuously with p_d.`, value: regime, color: regimeColor }),
      ),

      // Regime bar
      React.createElement("div", { style: { marginTop: 14 } },
        React.createElement("div", { style: { fontSize: 10, color: C.muted, fontFamily: "monospace", marginBottom: 4 } }, "REGIME BAR — current p_d position (teal marker)"),
        React.createElement(RegimeBar, { thA, thRecov: thB, thFeas: th_feas(e, R), paVal, pbVal, pd: pdFrac, bImpossible: isAttackBImpossible(tauClamped, S, e) })
      )
    ),

    // Tabs
    React.createElement("div", { style: { display: "flex", gap: 3, marginBottom: 14, flexWrap: "wrap" } },
      TABS.map(tb => React.createElement("button", {
        key: tb.id, onClick: () => setTab(tb.id),
        style: {
          background: tab === tb.id ? C.blue : C.panel,
          color: tab === tb.id ? "#0d1117" : C.muted,
          border: `1px solid ${tab === tb.id ? C.blue : C.border}`,
          borderRadius: 6, padding: "6px 16px", fontSize: 12,
          fontFamily: "monospace", cursor: "pointer", fontWeight: tab === tb.id ? 700 : 400
        }
      }, tb.label))
    ),

    // Tab panels
    React.createElement("div", { style: { background: C.panel, border: `1px solid ${C.border}`, borderRadius: 10, padding: "18px 14px" } },

      // ── Overview tab ──
      tab === "overview" && React.createElement(React.Fragment, null,
        React.createElement(SecHead, null, "Attack A vs Attack B — same p_d axis"),
        React.createElement("div", { style: { fontSize: 11, color: C.muted, marginBottom: 8 } },
          `Parameters: R=${R}, t=${tClamped}, S=${S}, τ=${tauClamped}, e=${e}, N=${N}, K=${Math.floor(N/e)}  ·  `,
          React.createElement("span", { style: { color: C.yellow } }, `Attack A needs ${failsNeeded} failure(s)`),
          "  ·  ",
          React.createElement("span", { style: { color: C.red } }, `Attack B needs ${hitsNeeded} hit(s)`),
          isAttackBImpossible(tauClamped, S, e) ? React.createElement("span", { style: { color: C.green, fontWeight: "bold" } }, `  ·  τ/S > 1/e → Attack B impossible`) : null
        ),
        // Dependency chain
        React.createElement("div", { style: { fontSize: 10, fontFamily: "monospace", color: C.muted, marginBottom: 12, padding: "8px 12px", background: C.panel2, borderRadius: 6, border: `1px solid ${C.border}` } },
          React.createElement("span", { style: { color: C.text } }, "Dependency chain: "),
          React.createElement("span", { style: { color: C.blue } }, `(N=${N}, e=${e})`),
          " → ",
          React.createElement("span", { style: { color: C.blue } }, `K=${Math.floor(N/e)}`),
          " → ",
          React.createElement("span", { style: { color: C.purple } }, `(p_d, R=${R}, t=${tClamped})`),
          " → ",
          React.createElement("span", { style: { color: C.yellow } }, `q_A=${pfVal.toExponential(2)}`),
          ", ",
          React.createElement("span", { style: { color: C.red } }, `q_B=${pEff(pdFrac, R, tClamped, N, Math.floor(N/e), 1.0).toExponential(2)}`),
          " → ",
          React.createElement("span", { style: { color: C.green } }, `(S=${S}, τ=${tauClamped})`),
          " → ",
          React.createElement("span", { style: { color: C.yellow } }, `P_A=${paVal.toExponential(2)}`),
          ", ",
          React.createElement("span", { style: { color: C.red } }, `P_B=${pbVal.toExponential(2)}`)
        ),
        React.createElement("div", { style: { display: "flex", gap: 16, flexWrap: "wrap" } },
          React.createElement(AttackChart, {
            title: "Attack A (P_A) vs p_d",
            sub: `Prob. targeted validator fails sampling. Needs ${failsNeeded} subnet failure(s).`,
            data: overviewData, keys: ["a"], colors: [C.yellow], labels: [`Attack A (τ=${tauClamped})`]
          }),
          React.createElement(AttackChart, {
            title: "Attack B (P_B) vs p_d",
            sub: `Prob. validator accepts unavailable data. Needs ${hitsNeeded} captured subnet hit(s).`,
            data: overviewData, keys: ["b"], colors: [C.red], labels: [`Attack B (τ=${tauClamped})`]
          })
        )
      ),

      // ── τ tab ──
      tab === "tau" && React.createElement(React.Fragment, null,
        React.createElement(SecHead, null, "τ effect on Attack A and Attack B"),
        React.createElement("div", { style: { fontSize: 11, color: C.muted, marginBottom: 6 } },
          `Fixed: R=${R}, t=${tClamped}, S=${S}, e=${e}, N=${N}  ·  `,
          React.createElement("span", { style: { color: C.yellow } }, "τ↑ → Attack A easier (S−τ+1 failures needed)"),
          "  ·  ",
          React.createElement("span", { style: { color: C.red } }, "τ↑ → Attack B harder (τ hits needed)"),
          `  ·  τ=S (τ=${S}) is worst for A (1 failure), best for B (${S} hits)`,
          `  ·  `,
          React.createElement("span", { style: { color: C.green } }, `Impossibility: τ > S/e = ${(S/e).toFixed(0)} → P_B = 0`)
        ),
        React.createElement("div", { style: { display: "flex", gap: 16, flexWrap: "wrap" } },
          React.createElement(AttackChart, {
            title: "Attack A vs p_d — varying τ",
            sub: `Higher τ → fewer failures needed for Attack A. τ=${S} (max): only 1 failure needed. τ=1: all ${S} failures needed.`,
            data: tauDataA,
            keys: tauVals.map((_, i) => "v" + i),
            colors: LINE_COLORS,
            labels: tauVals.map(v => `τ=${v} (${S-v+1} fail${v===S?' worst A':''}${v===1?' best A':''})`)
          }),
          React.createElement(AttackChart, {
            title: "Attack B vs p_d — varying τ",
            sub: `Higher τ → more hits needed for Attack B. τ=${S} (max): all ${S} hits needed. τ=1: only 1 hit needed.`,
            data: tauDataB,
            keys: tauVals.map((_, i) => "v" + i),
            colors: LINE_COLORS,
            labels: tauVals.map(v => `τ=${v} (${v} hits${v===S?' best B':''}${v===1?' worst B':''})`)
          })
        ),
        React.createElement("div", { style: { marginTop: 14 } },
          React.createElement("div", { style: { fontSize: 10, color: C.muted, fontFamily: "monospace", marginBottom: 6 } }, "REGIME BARS — how τ shifts Attack A threshold (Attack B threshold is τ-independent)"),
          tauVals.map(tv => React.createElement("div", { key: tv, style: { marginBottom: 8 } },
            React.createElement("div", { style: { fontSize: 10, fontFamily: "monospace", color: C.muted, marginBottom: 2 } },
              `τ=${tv}  →  A needs ${S-tv+1} failure(s)${tv===S?' ← worst for A':tv===1?' ← best for A':''}  ·  B needs ${tv} hit(s)${tv===1?' ← worst for B':tv===S?' ← best for B':''}  ·  A crossover: ${(th_A(tv, S, tClamped)*100).toFixed(1)}%${isAttackBImpossible(tv, S, e) ? '  ·  B IMPOSSIBLE (τ>S/e)' : ''}`
            ),
            React.createElement(RegimeBar, { thA: th_A(tv, S, tClamped), thRecov: thB, thFeas: th_feas(e, R), paVal: PA(pdFrac, R, tClamped, S, tv), pbVal: PB_full(pdFrac, R, tClamped, N, Math.floor(N/e), S, tv), pd: pdFrac, bImpossible: isAttackBImpossible(tv, S, e) })
          ))
        )
      ),

      // ── t tab ──
      tab === "t" && React.createElement(React.Fragment, null,
        React.createElement(SecHead, null, "t effect — nodes queried per subnetwork"),
        React.createElement("div", { style: { fontSize: 11, color: C.muted, marginBottom: 6 } },
          `Fixed: R=${R}, S=${S}, τ=${tauClamped}, e=${e}, N=${N}  ·  `,
          React.createElement("span", { style: { color: C.purple } }, "t↑ → Attack A harder (all t queries must hit adversarial nodes)"),
          "  ·  ",
          React.createElement("span", { style: { color: C.muted } }, "t ↑ → Attack B easier (higher chance of hitting adversarial node with data in partial capture subnet)")
        ),
        React.createElement("div", { style: { display: "flex", gap: 16, flexWrap: "wrap" } },
          React.createElement(AttackChart, {
            title: "Attack A vs p_d — varying t",
            sub: `At t=R=${R} only full capture fails — partial presence gives zero advantage. Lower curves are better.`,
            data: tDataA,
            keys: tVals.map((_, i) => "v" + i),
            colors: LINE_COLORS,
            labels: tVals.map(v => `t=${v}${v === R ? " (=R)" : ""}`)
          }),
          React.createElement(AttackChart, {
            title: "Attack B vs p_d — varying t",
            sub: `Higher t → P_B increases (more chance of hitting adversarial node with data). t now affects both attacks.`,
            data: tDataB,
            keys: tVals.map((_, i) => "v" + i),
            colors: LINE_COLORS,
            labels: tVals.map(v => `t=${v}${v === R ? " (=R)" : ""}`)
          })
        ),
        React.createElement("div", { style: { marginTop: 14, padding: "10px 14px", background: C.panel2, borderRadius: 8, border: `1px solid ${C.border}`, fontSize: 11, color: C.muted } },
          React.createElement("span", { style: { color: C.purple } }, "Key insight: "),
          `t is a tradeoff parameter between Attack A and Attack B. Under the binomial approximation q_A = p_d^t, so higher t reduces Attack A directly. The Attack A crossover is (1−τ/S)^{1/t} — it shifts right as t increases. Higher t also raises p_samp, making Attack B easier. At t=R, Attack A is maximally protected but Attack B exposure is maximised. The jointly optimal t* should minimise max{P_A, P_B}.`
        )
      ),

      // ── R tab ──
      tab === "R" && React.createElement(React.Fragment, null,
        React.createElement(SecHead, null, "R effect — nodes per subnetwork (primary defence for Attack B)"),
        React.createElement("div", { style: { fontSize: 11, color: C.muted, marginBottom: 6 } },
          `Fixed: S=${S}, τ=${tauClamped}, e=${e}, N=${N} (t=R in each case to isolate R effect)  ·  `,
          React.createElement("span", { style: { color: C.green } }, "R↑ → Attack B weaker (p_d^R drops exponentially). Attack A: P_fail^eff = p_d^t is R-independent under binomial approx — t is primary Attack A defence."),
          "  ·  Both regime thresholds shift right toward 1"
        ),
        React.createElement("div", { style: { display: "flex", gap: 16, flexWrap: "wrap" } },
          React.createElement(AttackChart, {
            title: "Attack A vs p_d — varying R",
            sub: "Attack B compresses strongly with R (p_d^R). Attack A: P_fail^eff=p_d^t is R-independent — curve shape driven by t, not R.",
            data: rDataA,
            keys: rVals.map((_, i) => "v" + i),
            colors: LINE_COLORS,
            labels: rVals.map(v => `R=${v}`)
          }),
          React.createElement(AttackChart, {
            title: "Attack B vs p_d — varying R",
            sub: "P_B depends on R through p_samp(a,R,t) and K-selection. R is the primary structural defence for Attack B.",
            data: rDataB,
            keys: rVals.map((_, i) => "v" + i),
            colors: LINE_COLORS,
            labels: rVals.map(v => `R=${v}`)
          })
        ),
        React.createElement("div", { style: { marginTop: 14 } },
          React.createElement("div", { style: { fontSize: 10, color: C.muted, fontFamily: "monospace", marginBottom: 6 } }, "REGIME BARS — how R shifts both thresholds"),
          rVals.map(rv => React.createElement("div", { key: rv, style: { marginBottom: 8 } },
            React.createElement("div", { style: { fontSize: 10, fontFamily: "monospace", color: C.muted, marginBottom: 2 } },
              `R=${rv}  →  A crossover: ${(th_A(tauClamped, S, Math.min(tClamped, rv))*100).toFixed(1)}%  ·  B feas: ${(th_feas(e, rv)*100).toFixed(1)}%  ·  Recovery: ${(th_B(e, rv)*100).toFixed(1)}%  ·  p_d^R at p_d=${pd}%: ${Math.pow(pdFrac, rv).toExponential(2)}`
            ),
            React.createElement(RegimeBar, { thA: th_A(tauClamped, S, Math.min(tClamped, rv)), thRecov: th_B(e, rv), thFeas: th_feas(e, rv), paVal: PA(pdFrac, rv, Math.min(tClamped, rv), S, tauClamped), pbVal: PB_full(pdFrac, rv, Math.min(tClamped, rv), N, Math.floor(N/e), S, tauClamped), pd: pdFrac, bImpossible: isAttackBImpossible(tauClamped, S, e) })
          ))
        )
      )

    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
